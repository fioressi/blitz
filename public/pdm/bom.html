<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stückliste | HERPERT</title>
  <style>
    :root{--bg:#101928;--panel:rgba(255,255,255,.07);--line:rgba(255,255,255,.13);--text:#edf4ff;--muted:#aab8ca;--accent:#66d9ef}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#1e3350,var(--bg) 65%);color:var(--text);min-height:100vh}
    .topbar{display:flex;align-items:center;gap:14px;padding:13px 22px;background:rgba(255,255,255,.06);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .embedded .topbar{display:none}
    .embedded body{background:transparent}
    .embedded .wrap{padding-top:8px}
    a.back{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;padding:5px 10px;border:1px solid var(--line);border-radius:7px}
    a.back:hover{background:rgba(255,255,255,.08);color:var(--text)}
    .brand{font-size:15px;font-weight:900;color:var(--accent);letter-spacing:.04em;margin-left:4px}
    .spacer{flex:1}
    select.lang{padding:5px 10px;font-size:12px;font-weight:900;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);border-radius:7px;color:var(--text);cursor:pointer;appearance:none;min-width:52px;text-align:center}
    .wrap{width:min(1200px,94%);margin:0 auto;padding:24px 0 40px}
    h1{margin:0 0 18px;font-size:26px;font-weight:900;color:var(--accent)}
    .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .filter-bar input{flex:1;min-width:160px;padding:9px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:13px}
    .filter-bar input:focus{outline:none;border-color:rgba(102,217,239,.4)}
    .filter-bar button{padding:9px 18px;background:rgba(102,217,239,.12);border:1px solid rgba(102,217,239,.35);border-radius:8px;color:var(--accent);font-weight:700;cursor:pointer;font-size:13px}
    .filter-bar button:hover{background:rgba(102,217,239,.2)}
    .hint{color:var(--muted);font-size:13px;margin-bottom:20px}
    .table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{background:rgba(255,255,255,.05)}
    th{padding:10px 14px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--line);white-space:nowrap}
    td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.03)}
    #msg{padding:32px;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" id="home-link" href="./index.html">← Hauptmenü</a>
    <span class="brand">HERPERT</span>
    <span class="spacer"></span>
    <select class="lang" id="lang-sel" aria-label="Language">
      <option value="de">DE</option>
      <option value="en">EN</option>
      <option value="hu">HU</option>
    </select>
  </div>
  <div class="wrap">
    <h1 id="page-title">Stückliste</h1>
    <div class="filter-bar">
      <input id="filter-input" placeholder="Part-ID oder Projekt eingeben…" type="text">
      <button id="load-btn">Laden</button>
    </div>
    <p class="hint" id="hint-text">Part-ID oder Projekt-Code eingeben und Laden klicken.</p>
    <div class="table-wrap" id="table-wrap" style="display:none">
      <table>
        <thead id="bom-thead"></thead>
        <tbody id="bom-tbody"></tbody>
      </table>
    </div>
  </div>
  <script>
  (() => {
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
    const API = 'https://pdm-api.azurewebsites.net/api';
    const STORE = 'herpert-lang';
    let lang = localStorage.getItem(STORE) || 'de';

    const L = {
      de: { title:'Stückliste', home:'← Hauptmenü', ph:'Part-ID oder Projekt eingeben…', load:'Laden', hint:'Part-ID oder Projekt-Code eingeben und Laden klicken.', loading:'Lade Stückliste…', empty:'Keine Stücklisteneinträge gefunden.', err:'Fehler beim Laden' },
      en: { title:'Bill of Materials', home:'← Main Menu', ph:'Enter Part-ID or Project…', load:'Load', hint:'Enter a Part-ID or Project code and click Load.', loading:'Loading BOM…', empty:'No BOM entries found.', err:'Error loading data' },
      hu: { title:'Darabjegyzék', home:'← Főmenü', ph:'Adja meg a Part-ID-t vagy Projektet…', load:'Betölt', hint:'Adja meg a Part-ID-t vagy a Projekt-kódot, majd kattintson Betölt.', loading:'Darabjegyzék betöltése…', empty:'Nem található darabjegyzék-bejegyzés.', err:'Betöltési hiba' },
    };
    const t = k => (L[lang]||L.de)[k];

    const cols = [
      { key:'Position',    label:{de:'Pos.',en:'Pos.',hu:'Poz.'} },
      { key:'ParentPartId',label:{de:'Elternteil',en:'Parent',hu:'Szülő'} },
      { key:'ParentName',  label:{de:'Elternteil-Name',en:'Parent Name',hu:'Szülő neve'} },
      { key:'ChildPartId', label:{de:'Part-ID',en:'Part-ID',hu:'Part-ID'} },
      { key:'ChildName',   label:{de:'Bezeichnung',en:'Name',hu:'Megnevezés'} },
      { key:'Quantity',    label:{de:'Menge',en:'Qty',hu:'Mennyiség'} },
      { key:'ProjectCode', label:{de:'Projekt',en:'Project',hu:'Projekt'} },
    ];

    const applyLang = () => {
      document.title = t('title') + ' | HERPERT';
      document.getElementById('page-title').textContent = t('title');
      document.getElementById('home-link').textContent = t('home');
      document.getElementById('filter-input').placeholder = t('ph');
      document.getElementById('load-btn').textContent = t('load');
      document.getElementById('hint-text').textContent = t('hint');
      document.getElementById('lang-sel').value = lang;
      const thead = document.getElementById('bom-thead');
      thead.innerHTML = '<tr>' + cols.map(c => `<th>${c.label[lang]||c.label.de}</th>`).join('') + '</tr>';
    };

    const esc = v => String(v??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    const doLoad = async () => {
      const q = document.getElementById('filter-input').value.trim();
      if (!q) return;
      const tbody = document.getElementById('bom-tbody');
      tbody.innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;padding:32px;color:#aab8ca">${t('loading')}</td></tr>`;
      document.getElementById('table-wrap').style.display = '';
      document.getElementById('hint-text').style.display = 'none';

      const params = new URLSearchParams({ top: '300' });
      if (/^\d+$/.test(q)) params.set('objectId', q);
      else params.set('projectId', q);

      try {
        let res = await fetch(`${API}/bom?${params}`);
        if (!res.ok) throw new Error(res.status);
        let rows = await res.json();

        if (!rows.length && !/^\d+$/.test(q)) {
          const sr = await fetch(`${API}/search?type=PROJECT&q=${encodeURIComponent(q)}`);
          const found = await sr.json();
          if (found.length) {
            const pid = found[0].id;
            res = await fetch(`${API}/bom?projectId=${pid}&top=300`);
            rows = await res.json();
          }
        }

        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;padding:32px;color:#aab8ca">${t('empty')}</td></tr>`;
          return;
        }
        tbody.innerHTML = rows.map(r =>
          '<tr>' + cols.map(c => `<td>${esc(r[c.key])}</td>`).join('') + '</tr>'
        ).join('');
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;padding:32px;color:#f87171">${t('err')}: ${e.message}</td></tr>`;
      }
    };

    document.getElementById('lang-sel').addEventListener('change', e => {
      lang = e.target.value;
      localStorage.setItem(STORE, lang);
      applyLang();
    });
    document.getElementById('load-btn').addEventListener('click', doLoad);
    document.getElementById('filter-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLoad(); });

    applyLang();
  })();
  </script>
</body>
</html>
