<html lang="de">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fertigungsauftrag | HERPERT</title>
</head>
<body>
  <div id="app"></div>
  <script>
  window.HERPERT_LIVE_CONFIG = {
    title: { de: 'Fertigungsaufträge', en: 'Production Orders', hu: 'Gyártási megbízások' },
    endpoint: '/production-orders?top=200',

      { key: 'RequestedDelivery', label: { de: 'Termin',      en: 'Due Date',    hu: 'Határidő'   }, date: true },
