<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HERPERT Hauptmenu</title>
  <link rel="stylesheet" href="./form-page.css">
  <style>
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:20px}
    .menu-section{display:flex;flex-direction:column}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .section-head h2{margin:0;font-size:17px}
    .count{color:var(--muted);font-size:12px;font-weight:700}
    .menu-list{display:grid;gap:8px}
    .menu-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;min-height:52px;padding:10px 11px;border:1px solid var(--line);border-radius:8px;background:var(--soft);color:var(--ink);text-decoration:none;transition:background .12s,box-shadow .12s}
    .menu-item:hover{background:var(--panel);box-shadow:var(--shadow)}
    .menu-item h3{margin:0;font-size:14px;font-weight:700}
    .menu-item small{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.3}
    .menu-item.live{border-color:rgba(22,121,76,.35)}
    .menu-item.partial{border-color:rgba(183,121,31,.28)}
    .pill{padding:3px 7px;border-radius:999px;font-size:10px;font-weight:900;letter-spacing:.04em;white-space:nowrap;align-self:flex-start}
    .pill.live{background:#edf8f2;color:var(--ok)}
    .pill.partial{background:#fff8e8;color:var(--warn)}
    @media(max-width:820px){.menu-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./page-data.js"></script>
  <script>
    (() => {
      const data = window.HERPERT_PAGE_DATA;
      const storeKey = 'herpert-lang';
      let lang = localStorage.getItem(storeKey) || 'de';
      if (!data.i18n[lang]) lang = 'de';
      const t = name => data.i18n[lang][name] || data.i18n.de[name] || name;
      const local = v => v?.[lang] || v?.de || '';
      const esc = s => String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));

      const allPages = [...data.pages, ...data.existing];

      const render = () => {
        document.documentElement.lang = lang;
        document.title = t('home') + ' | HERPERT';

        const groupsHtml = data.groups.map(group => {
          const pages = allPages.filter(p => p.section === group.key);
          if (!pages.length) return '';
          const itemsHtml = pages.map(p => {
            const isLive = p.state === 'live';
            const cls = isLive ? 'live' : 'partial';
            const pill = `<span class="pill ${cls}">${esc(isLive ? t('live') : t('preparedBadge'))}</span>`;
            const sub = p.form ? `<small>${esc(p.form)}</small>` : '';
            return `<a class="menu-item ${cls}" href="./${esc(p.file)}"><span><h3>${esc(local(p.titles))}</h3>${sub}</span>${pill}</a>`;
          }).join('');
          return `<section class="panel menu-section" style="padding:14px 14px 12px"><div class="section-head"><h2>${esc(local(group.titles))}</h2><span class="count">${pages.length}</span></div><div class="menu-list">${itemsHtml}</div></section>`;
        }).join('');

        document.getElementById('app').innerHTML = `<div class="shell">
          <header class="topbar"><div class="topbar-inner">
            <div class="brand">HERPERT</div>
            <div class="spacer"></div>
            <select id="lang-switcher" class="lang-select notranslate" aria-label="Language selector" translate="no">
              <option value="de"${lang==='de'?' selected':''}>DE</option>
              <option value="en"${lang==='en'?' selected':''}>EN</option>
              <option value="hu"${lang==='hu'?' selected':''}>HU</option>
            </select>
          </div></header>
          <main>
            <section class="hero"><div>
              <div class="kicker">HERPERT PDM</div>
              <h1>${esc(t('home'))}</h1>
              <p>${esc(t('intro'))}</p>
            </div></section>
            <div class="menu-grid">${groupsHtml}</div>
          </main>
        </div>`;

        document.getElementById('lang-switcher').addEventListener('change', e => {
          lang = e.target.value;
          localStorage.setItem(storeKey, lang);
          render();
        });
      };

      render();
    })();
  </script>
</body>
</html>
