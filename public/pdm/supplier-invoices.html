<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rechnungen | HERPERT</title>
</head>
<body>
  <div id="app"></div>
  <script>
  window.HERPERT_LIVE_CONFIG = {
    title: { de: 'Eingangsrechnungen', en: 'Supplier Invoices', hu: 'Bejövő számlák' },
    endpoint: '/invoices?top=200',
