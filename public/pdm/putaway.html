<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Einlagern | HERPERT</title>
</head>
<body>
  <div id="app"></div>
  <script>
  window.HERPERT_LIVE_CONFIG = {
    title: { de: 'Einlagern', en: 'Putaway', hu: 'Betárolás' },
    endpoint: '/purchase-orders-tracking?top=400',
    transform: d => d.orders || d,
    filterRows: rows => rows.filter(r => ['ARRIVED','STOCKED'].includes((r.Status||'').toUpperCase())),
    searchKeys: ['PoNumber', 'SupplierName', 'PartId', 'Status'],
    columns: [
      { key: 'PoNumber',     label: { de: 'PO-Nr.',    en: 'PO No.',   hu: 'Rendelés-szám' } },
      { key: 'SupplierName', label: { de: 'Lieferant', en: 'Supplier', hu: 'Szállító'      } },
      { key: 'PartId',       label: { de: 'Part-ID',   en: 'Part-ID',  hu: 'Part-ID'       } },
      { key: 'OrderName',    label: { de: 'Artikel',   en: 'Article',  hu: 'Cikk'          } },
      { key: 'Status',       label: { de: 'Status',    en: 'Status',   hu: 'Státusz'       },
        badge: { 'ARRIVED':'#ffd166','STOCKED':'#8ee28e','*':'#aab8ca' } },
    ],
  };
  </script>
  <script src="./live-table.js"></script>
</body>
</html>
