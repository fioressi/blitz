<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bestellungen | HERPERT</title>
</head>
<body>
  <div id="app"></div>
  <script>
  window.HERPERT_LIVE_CONFIG = {
    title: { de: 'Bestellungen', en: 'Purchase Orders', hu: 'Rendelések' },
    endpoint: '/purchase-orders-tracking?top=400',
    transform: d => d.orders || d,
    searchKeys: ['PoNumber', 'OrderName', 'SupplierName', 'Status', 'PartId'],
    columns: [
      { key: 'PoNumber',     label: { de: 'PO-Nr.',      en: 'PO No.',     hu: 'Rendelés-szám'  } },
      { key: 'SupplierName', label: { de: 'Lieferant',   en: 'Supplier',   hu: 'Szállító'       } },
      { key: 'PartId',       label: { de: 'Part-ID',     en: 'Part-ID',    hu: 'Part-ID'        } },
      { key: 'OrderName',    label: { de: 'Bezeichnung', en: 'Name',       hu: 'Megnevezés'     } },
      { key: 'Status',       label: { de: 'Status',      en: 'Status',     hu: 'Státusz'        },
        badge: { 'DRAFT':'#aab8ca','VENDOR_ASSIGNED':'#66d9ef','QUOTED':'#ffd166','ORDERED':'#8ee28e','SHIPPING':'#66d9ef','ARRIVED':'#8ee28e','STOCKED':'#aab8ca','*':'#aab8ca' } },
      { key: 'Currency',     label: { de: 'Währung',     en: 'Currency',   hu: 'Deviza'         } },
    ],
  };
  </script>
  <script src="./live-table.js"></script>
</body>
</html>
